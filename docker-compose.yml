services:
  db:
    image: postgres:16-alpine
    container_name: demandasrr-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      # Repassados ao init script (db/init/01_harden.sh).
      APP_DB_USER: ${APP_DB_USER}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Roda apenas no bootstrap do volume — hardening de privilégios.
      - ./db/init:/docker-entrypoint-initdb.d:ro
    networks:
      - demandasrr-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: demandasrr-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - demandasrr-net
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: demandasrr-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # App conecta com o usuário NOSUPERUSER — nunca com o bootstrap.
      DATABASE_URL: postgresql+asyncpg://${APP_DB_USER}:${APP_DB_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - demandasrr-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/v1/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  frontend:
    # React 18 + Vite + TS + Tailwind + TanStack Query + Zustand + HeadlessUI 2 + PWA.
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    container_name: demandasrr-frontend
    restart: unless-stopped
    networks:
      - demandasrr-net

  nginx:
    image: nginx:1.27-alpine
    container_name: demandasrr-nginx
    restart: unless-stopped
    ports:
      - "8180:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - demandasrr-net
    healthcheck:
      # 127.0.0.1 em vez de localhost: imagem nginx-alpine tenta IPv6 primeiro
      # e marca unhealthy sob load — o server escuta só IPv4.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  demandasrr-net:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
