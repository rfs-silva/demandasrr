user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}


http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent"';
    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;
    server_tokens off;
    client_max_body_size 10M;

    # ---------- Gzip ----------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # ---------- Rate-limit por IP nas rotas de auth ----------
    # Primeira linha de defesa — antes mesmo de chegar no FastAPI/slowapi.
    limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=10r/m;

    # ---------- Scanners e fuzzers: corta na borda ----------
    # 444 = "fecha conexão sem resposta", não dá pistas para o atacante.
    map $http_user_agent $is_scanner {
        default                    0;
        ~*sqlmap                   1;
        ~*nikto                    1;
        ~*nmap                     1;
        ~*masscan                  1;
        ~*acunetix                 1;
        ~*nuclei                   1;
        ~*dirbuster                1;
        ~*gobuster                 1;
        ~*ffuf                     1;
        ~*feroxbuster              1;
        ~*wpscan                   1;
        ~*nessus                   1;
        ~*openvas                  1;
        ~*qualys                   1;
        ~*havij                    1;
        ~*hydra                    1;
        ~*metasploit               1;
        ~*xspider                  1;
        ~*"^Mozlila"               1;
        ~*"^$"                     1;
    }

    map $http_x_forwarded_proto $proxy_forwarded_proto {
        default $http_x_forwarded_proto;
        ""      $scheme;
    }

    map $http_x_forwarded_port $proxy_forwarded_port {
        default $http_x_forwarded_port;
        ""      $server_port;
    }

    upstream backend {
        server backend:8000;
    }

    upstream frontend {
        server frontend:80;
    }

    server {
        listen       80;
        server_name  _;

        # ---------- Security headers ----------
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        # script-src: removido 'unsafe-inline' (Vite produção não precisa).
        # style-src: mantém 'unsafe-inline' por causa de classes do Tailwind injetadas.
        # Permite carregar fontes do Google Fonts e rsms.me (Inter) — usados no index.html.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://rsms.me; img-src 'self' data: blob:; connect-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com https://rsms.me; font-src 'self' data: https://fonts.gstatic.com https://rsms.me; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';" always;
        # HSTS — habilitar somente quando HTTPS estiver em uso:
        # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

        # ---------- Bloqueio de scanners por user-agent ----------
        if ($is_scanner) { return 444; }

        # ---------- Probe paths típicos de scanners ----------
        # Não temos PHP, WordPress, GLPI, painéis admin clássicos: tudo retorna 444.
        location ~* ^/(wp-(admin|login|content|includes)|xmlrpc\.php|administrator|phpmyadmin|phpinfo\.php|adminer\.php|setup\.php|joomla|drupal|magento|cgi-bin|boaform|hudson|jenkins|owa|telescope|console|webconsole|server-status) { return 444; }
        location ~* ^/(\.git|\.svn|\.env|\.aws|\.ssh|\.docker|backup|dump|\.htaccess|\.htpasswd|wp-config\.php) { return 444; }
        location ~* ^/(actuator|api/v[0-9]+/actuator) { return 444; }
        # Bloqueia payloads óbvios em qualquer lugar da URI (path + query string).
        # SQLi / path-traversal / XSS / leitura de arquivos.
        if ($request_uri ~* "(union(\s|\+|%20)+select|select(\s|\+|%20)+from|/etc/passwd|<script|\.\./\.\./|/proc/self|\\bor\\b\\s+1=1)") {
            return 444;
        }

        # ---------- API ----------
        location /api/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $http_host;
            proxy_set_header   X-Forwarded-Host  $http_host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $proxy_forwarded_proto;
            proxy_set_header   X-Forwarded-Port  $proxy_forwarded_port;
            proxy_read_timeout 60s;
        }

        # ---------- Auth: rate-limit e body pequeno ----------
        # Body de login/refresh é JSON minúsculo: cortar tudo acima de 4 KB
        # impede tentativas de amplificação por payload.
        location ~ ^/api/v1/auth/(login|refresh|logout) {
            limit_req zone=auth_zone burst=5 nodelay;
            limit_req_status 429;
            client_max_body_size 4k;

            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $http_host;
            proxy_set_header   X-Forwarded-Host  $http_host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $proxy_forwarded_proto;
            proxy_set_header   X-Forwarded-Port  $proxy_forwarded_port;
        }

        # ---------- Frontend (SPA) ----------
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $http_host;
            proxy_set_header   X-Forwarded-Host  $http_host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $proxy_forwarded_proto;
            proxy_set_header   X-Forwarded-Port  $proxy_forwarded_port;
        }
    }
}
